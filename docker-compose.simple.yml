# Docker Compose - Versi Sederhana
# Hanya menjalankan API dan Neo4j (optional)
# Menggunakan Ollama yang sudah terinstall di server
# NOTE: This compose file is currently NOT functional (no Dockerfile in repo) and is kept as a template. See README Quick Start for the supported way to run.

version: '3.8'

services:
  # RAG-LLM API Service
  api:
    build: .
    container_name: rag-llm-api
    ports:
      - "8001:8001"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./chroma_db:/app/chroma_db
      - ./backend/config.yaml:/app/config.yaml:ro
    environment:
      - OLLAMA_BASE_URL=http://localhost:11434
      - CHROMA_PERSIST_DIRECTORY=/app/chroma_db
      - LOG_LEVEL=INFO
    restart: unless-stopped

  # Neo4j Knowledge Graph (Optional - jalankan jika diperlukan)
  # Uncomment jika ingin menggunakan Neo4j
  # neo4j:
  #   image: neo4j:5.14
  #   container_name: neo4j-graph
