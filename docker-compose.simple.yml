  #     - "7474:7474"  # HTTP
  #     - "7687:7687"  # Bolt
  #   environment:
  #     - NEO4J_AUTH=${NEO4J_AUTH:-neo4j/research123}
  #   volumes:
  #     - neo4j_data:/data
  #   restart: unless-stopped

