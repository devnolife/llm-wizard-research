# Wizard Research — Neuro-Symbolic Synthesis Gap Detection Configuration

# LLM Configuration
llm:
  provider: "ollama"
  model_name: "llama3.2:latest"  # Default (3B). Eksperimen komparasi memakai gpt-oss:latest (13B) via --model
  base_url: "http://localhost:11434"
  temperature: 0.7
  max_tokens: 2048
  timeout: 120
  context_window: 8192
  top_p: 0.9
  # Performance: keep model resident + parallel request budget.
  # OLLAMA_KEEP_ALIVE / OLLAMA_NUM_PARALLEL env vars override these (see .env).
  keep_alive: "30m"
  num_parallel: 4

# Vector Database Configuration
vector_db:
  persist_directory: ./chroma_db
  collection_name: research_papers_ml
  embedding_model: sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2
  distance_metric: cosine
  batch_size: 100

# Neo4j Configuration (Optional)
neo4j:
  enabled: false
  uri: bolt://localhost:7687
  user: neo4j
  password: ""
  database: neo4j

# Retrieval Configuration
retrieval:
  top_k: 5
  chunk_size: 512
  chunk_overlap: 50
  # Cosine similarity threshold for paraphrase-multilingual-MiniLM-L12-v2 —
  # scores rarely exceed 0.5 except near-duplicates; 0.15 filters noise while keeping recall
  min_relevance_score: 0.15
  max_context_tokens: 2000
  rerank_enabled: true
  reranker_model: cross-encoder/ms-marco-MiniLM-L-6-v2
  chunk_strategy: sections
  diversity_weight: 0.3

# Recommendation Configuration
recommendation:
  strategy: hybrid  # content, graph, gap_aware, hybrid
  max_recommendations: 10
  min_confidence: 0.6
  enable_explanation: true
  diversity_enabled: true

# Gap Detection Configuration
gap_detection:
  enabled: true
  analysis_depth: standard  # quick, standard, comprehensive
  min_gap_confidence: 0.6
  max_gaps: 10

# Multi-Agent Configuration
agents:
  enabled: true
  max_task_history: 100
  parallel_execution: true
  retry_failed_tasks: true
  max_retries: 2

# API Configuration
api:
  host: 0.0.0.0
  port: 8001
  workers: 4
  reload: false
  cors_enabled: true
  cors_origins:
    - http://localhost:5173
    - http://localhost:3000
    - http://localhost:8000
  rate_limit_enabled: true
  rate_limit_per_minute: 60

# Data Configuration
data:
  raw_path: ./data/raw
  processed_path: ./data/processed
  allowed_file_types:
    - pdf
    - txt
    - docx
  max_file_size_mb: 50
  auto_process: true

# Logging Configuration
log_level: INFO
log_file: ./logs/app.log
log_rotation: 10 MB
log_retention: 30 days

# Evaluation Metrics
evaluation:
  metrics:
    - relevance
    - diversity
    - novelty
    - coverage
  enable_feedback: true
  feedback_storage: ./data/feedback

# Performance Configuration
performance:
  enable_caching: true
  cache_ttl_seconds: 3600
  max_cache_size_mb: 500
  parallel_processing: true
  max_workers: 4

# Rule-Based Validation Layer Configuration
rule_engine:
  enabled: true
  rules:
    feasibility:
      F1:
        name: "Resource Compatibility"
        enabled: true
        critical: true
        confidence_penalty: -0.5
      F2:
        name: "Data Compatibility"
        enabled: true
        critical: false
        confidence_penalty: -0.2
      F3:
        name: "Scale Compatibility"
        enabled: true
        critical: true
        confidence_penalty: -0.5
    causality:
      C1:
        name: "Minimal Causal Evidence"
        enabled: true
        critical: false
        confidence_penalty: -0.15
        min_evidence_count: 2
      C2:
        name: "Causal Direction"
        enabled: true
        critical: true
        confidence_penalty: -0.5
      C3:
        name: "Confounding Check"
        enabled: true
        critical: false
        confidence_penalty: -0.2
    consistency:
      K1:
        name: "Internal Non-contradiction"
        enabled: true
        critical: false
        confidence_penalty: -0.1
      K2:
        name: "KG Fact Consistency"
        enabled: true
        critical: false
        confidence_penalty: -0.15
      K3:
        name: "Transitivity Check"
        enabled: true
        critical: false
        confidence_penalty: -0.15
  defaults:
    claim_confidence: 0.5
    min_confidence_threshold: 0.3
    on_missing_evidence: flag

# Fact Extraction Configuration
fact_extraction:
  enabled: true
  confidence_thresholds:
    llm_extracted: 0.7
    pattern_causal: 0.6
    pattern_contradiction: 0.5
    pattern_extension: 0.6
  entity_types:
    - METHOD
    - CONCEPT
    - DOMAIN
    - FINDING
    - DATASET
    - METRIC
    - PAPER
    - CONSTRAINT
  predicate_types:
    - USES_METHOD
    - PROPOSES
    - APPLIES_TO
    - ACHIEVES
    - REQUIRES_RESOURCE
    - REQUIRES_DATA
    - IMPROVES
    - CONTRADICTS
    - EXTENDS
    - EVALUATED_ON
    - HAS_CONSTRAINT
    - DISCUSSES
  linguistic_markers:
    causal:
      - "causes"
      - "leads to"
      - "results in"
      - "because"
      - "therefore"
      - "consequently"
      - "due to"
      - "effect of"
      - "contributes to"
      - "enables"
      - "prevents"
      - "inhibits"
      - "improves"
    contradiction:
      - "however"
      - "contradicts"
      - "in contrast"
      - "whereas"
      - "on the other hand"
      - "inconsistent with"
      - "conflicts with"
      - "contrary to"
      - "disputes"
      - "challenges"
    extension:
      - "extends"
      - "builds upon"
      - "based on"
      - "improvement over"
      - "derived from"
      - "enhances"
      - "augments"

# Feature Flags
features:
  knowledge_graph: true
  gap_detection: true
  multi_agent: true
  streaming_responses: true
  batch_ingestion: true
  auto_summarization: true
